---
name: build-package-release

on: push

jobs:
  build:
    name: Build Python Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build source and wheel distributions
        run: |
          uv tool install hatch
          uv tool run hatch build
      - name: Store the distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  pypi-publish:
    name: Upload release to PyPI
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/catalystcoop.ferc-xbrl-extractor
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Generate artifact attestation for sdist and wheel
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-publish:
    name: Release package on GitHub
    needs:
      - pypi-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Sign dist with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Upload artifact signatures to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create '${{ github.ref_name }}' ./dist/*.tar.gz ./dist/*.whl
          --generate-notes
          --repo '${{ github.repository }}'

  release-notify:
    runs-on: ubuntu-latest
    needs:
      - github-publish
    if: ${{ always() && needs.github-publish.result != 'skipped' }}
    steps:
      - name: Notify Zulip
        uses: zulip/github-actions-zulip/send-message@v2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: "build-status-bot@catalyst-cooperative.zulipchat.com"
          organization-url: "https://catalyst-cooperative.zulipchat.com"
          type: "stream"
          to: "pudl-deployments"
          topic: "ferc-xbrl-extractor"
          content: |
            ${{ needs.github-publish.result == 'success' && ':check:' || needs.github-publish.result == 'failure' && ':x:' || ':warning:' }} `build-package-release` completed with status `${{ needs.github-publish.result }}`.
            [Release `${{ github.ref_name }}`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})
            Repository: `${{ github.repository }}`
            Triggered by: `${{ github.actor }}`
            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
