name: pytest

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install hatch
        run: uv tool install hatch
      - name: Log environment details
        run: |
          uv --version
          hatch --version
          python --version
      - name: Run tests with coverage
        run: |
          hatch run test:all
      - name: Upload test coverage report to CodeCov
        # CODECOV_TOKEN here is the catalyst-cooperative org's shared "Global Upload
        # Token" (an organization-level secret, not a per-repo one -- see
        # .codecov.yml), not a repo-specific secret we need to mint per project.
        # Coverage reporting failing shouldn't fail this required check on its own,
        # since it's orthogonal to whether the tests passed.
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install hatch
        run: uv tool install hatch
      - name: Run linters
        run: |
          hatch run lint:check
