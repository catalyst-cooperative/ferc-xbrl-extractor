name: pytest

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install hatch
        run: uv tool install hatch
      # uv manages its own Python distributions rather than relying on the runner's
      # preinstalled ones (see [tool.uv] in pyproject.toml), so replaces
      # actions/setup-python. HATCH_PYTHON points Hatch straight at that interpreter,
      # skipping its own PATH-based discovery.
      - name: Install Python ${{ matrix.python-version }} via uv
        run: |
          uv python install ${{ matrix.python-version }}
          echo "HATCH_PYTHON=$(uv python find ${{ matrix.python-version }})" >> "$GITHUB_ENV"
      - name: Log environment details
        run: |
          uv --version
          hatch --version
          python --version
      - name: Run tests with coverage
        run: |
          hatch run test:all
      - name: Upload test coverage report to CodeCov
        # CODECOV_TOKEN here is the catalyst-cooperative org's shared "Global Upload
        # Token" (an organization-level secret, not a per-repo one -- see
        # .codecov.yml), not a repo-specific secret we need to mint per project.
        # Coverage reporting failing shouldn't fail this required check on its own,
        # since it's orthogonal to whether the tests passed.
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install hatch
        run: uv tool install hatch
      - name: Install Python 3.14 via uv
        run: |
          uv python install 3.14
          echo "HATCH_PYTHON=$(uv python find 3.14)" >> "$GITHUB_ENV"
      - name: Run linters
        run: |
          hatch run lint:check
      - name: Type check with ty
        # Not covered by pre-commit.ci (see .pre-commit-config.yaml's "ty" hook and
        # its `ci.skip` entry), so it's enforced here instead.
        run: |
          hatch run types:check
