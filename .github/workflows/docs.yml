---
name: docs

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  PUDL_DOCS_DISABLE_INTERSPHINX: "1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install hatch
        run: uv tool install hatch

      # uv manages its own Python distributions rather than relying on the runner's
      # preinstalled ones (see [tool.uv] in pyproject.toml), so replaces
      # actions/setup-python. HATCH_PYTHON points Hatch straight at that interpreter,
      # skipping its own PATH-based discovery.
      - name: Install Python 3.14 via uv
        run: |
          uv python install 3.14
          echo "HATCH_PYTHON=$(uv python find 3.14)" >> "$GITHUB_ENV"

      - name: Build documentation with Sphinx
        run: hatch run docs:build

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  docs-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
